<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BACKEND-003 | API de Contato</title>
  <style>
    :root {
      --bg: #050b12;
      --panel: #101820;
      --line: #26485f;
      --green: #00ff88;
      --cyan: #00e5ff;
      --text: #e8faff;
      --muted: #97c2cf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0a1f2d, #050b12 60%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { width: min(820px, 100%); margin: 0 auto; }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .top-actions a {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.48rem 0.84rem;
      color: var(--text);
      text-decoration: none;
      background: #0d1a26;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(16, 24, 32, 0.93);
      padding: 18px;
    }
    h1 { margin-top: 0; }
    .subtitle { color: var(--muted); }
    form { display: grid; gap: 8px; }
    label { color: #caebf8; }
    input, textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #07101a;
      color: var(--text);
      padding: 0.72rem 0.82rem;
    }
    button {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--green), var(--cyan));
      color: #00271b;
      font-weight: 700;
      padding: 0.62rem 0.9rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.75; cursor: not-allowed; }
    .status { min-height: 1.2em; margin-top: 8px; color: var(--muted); }
    .error { color: #ffbcbc; }
  </style>
</head>
<body>
  <main class="container">
    <div class="top-actions">
      <a href="../index.html#projetos">Voltar ao portfólio</a>
      <a href="https://github.com/iikxwl" target="_blank" rel="noopener noreferrer">Ver no GitHub</a>
    </div>

    <section class="panel">
      <h1>[BACKEND-003] API de Contato do Portfólio</h1>
      <p class="subtitle">Demonstração de envio para <code>POST /api/contact</code> com validação e retorno JSON.</p>

      <form id="contact-form" novalidate>
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" required minlength="2">

        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required>

        <label for="message">Mensagem</label>
        <textarea id="message" name="message" rows="5" required minlength="10"></textarea>

        <button id="submit-button" type="submit">POST /api/contact</button>
      </form>

      <p id="status" class="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById("contact-form");
    const submitButton = document.getElementById("submit-button");
    const statusEl = document.getElementById("status");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const payload = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        message: form.message.value.trim()
      };

      submitButton.disabled = true;
      submitButton.textContent = "Enviando...";
      setStatus("Enviando mensagem...");

      try {
        const response = await fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Falha ao enviar mensagem.");
        }

        setStatus(`Sucesso: ${data.message}`);
        form.reset();
      } catch (error) {
        setStatus(error.message || "Erro ao enviar mensagem.", true);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "POST /api/contact";
      }
    });
  </script>
</body>
</html>
