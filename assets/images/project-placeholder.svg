<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder de projeto</title>
  <desc id="desc">Imagem abstrata com gradientes para projeto de portfolio.</desc>
